<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FreshCart — Products</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="logo">🛒 FreshCart</h1>
      <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="products.html">Products</a>
        <a href="index.html">Logout</a>
      </nav>
    </header>

    <main>
      <h2>Today's Fresh Picks</h2>
      <div class="product-grid">
        <div class="product-card">
          <div class="product-emoji">🍎</div>
          <h3>Organic Apples</h3>
          <p class="price">$4.99 / kg</p>
          <button class="btn-primary">Add to Cart</button>
        </div>
        <div class="product-card">
          <div class="product-emoji">🥛</div>
          <h3>Fresh Milk 2%</h3>
          <p class="price">$5.49 / 2L</p>
          <button class="btn-primary">Add to Cart</button>
        </div>
        <div class="product-card">
          <div class="product-emoji">🍞</div>
          <h3>Whole Grain Bread</h3>
          <p class="price">$3.99</p>
          <button class="btn-primary">Add to Cart</button>
        </div>
        <div class="product-card">
          <div class="product-emoji">🥑</div>
          <h3>Avocado</h3>
          <p class="price">$2.49 each</p>
          <button class="btn-primary">Add to Cart</button>
        </div>
        <div class="product-card">
          <div class="product-emoji">🍌</div>
          <h3>Bananas</h3>
          <p class="price">$1.99 / kg</p>
          <button class="btn-primary">Add to Cart</button>
        </div>
        <div class="product-card">
          <div class="product-emoji">🥚</div>
          <h3>Free-Range Eggs</h3>
          <p class="price">$6.99 / dozen</p>
          <button class="btn-primary">Add to Cart</button>
        </div>
      </div>
    </main>

    <footer class="footer">
      <p>&copy; 2026 FreshCart Inc. · Toronto, ON</p>
    </footer>
  </div>
</body>
</html>
