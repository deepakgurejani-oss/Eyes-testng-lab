<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FreshCart — Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1 class="logo">🛒 FreshCart</h1>
      <p class="tagline">Fresh groceries, delivered fast</p>
    </header>

    <main class="login-box">
      <h2>Sign in to your account</h2>
      <form id="loginForm">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required>

        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required>

        <button type="button" class="btn-primary" onclick="window.location.href='dashboard.html'">Sign In</button>
      </form>
      <p class="footer-text">New to FreshCart? <a href="#">Create an account</a></p>
    </main>

    <footer class="footer">
      <p>&copy; 2026 FreshCart Inc. · Toronto, ON</p>
    </footer>
  </div>
</body>
</html>
